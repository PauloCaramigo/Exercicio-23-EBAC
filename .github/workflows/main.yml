name: Pipeline na pratica
on:
  push:
    branches:
      - main
  workflow_dispatch: 
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalação do node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalação das dependencias
        run: npm install

      - name: Rodar o build
        run: npm run build

  tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalação do node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Instalação das dependencias
        run: npm install

      - name: Rodar o lint
        run: npm run lint

      - name: Rodar os testes
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Instalação do node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Instalação do Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Deploy para o Vercel
        run: vercel --prod --yes --token=${{secrets.VERCEL_TOKEN}}
        env:
          VERCEL_PROJECT_ID: ${{secrets.VERCEL_PROJECT_ID}}
          VERCEL_ORG_ID: ${{secrets.VERCEL_ORG_ID}}
